<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscrição | Primeira IEQ</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">

<img src="assets/logo.png">

<span>Primeira IEQ</span>

</div>

</header>

<section class="form-section">

<div class="form-card">

<h1>Inscrição de Evento</h1>

<form id="inscricaoForm">

<input
type="text"
id="nome"
placeholder="Nome Completo"
required>

<input
type="email"
id="email"
placeholder="E-mail"
required>

<input
type="tel"
id="telefone"
placeholder="Telefone"
required>

<select id="evento">

<option>
Conferência Despertar
</option>

<option>
Retiro FLOW
</option>

<option>
Congresso de Mulheres
</option>

</select>

<button type="submit">

Confirmar Inscrição

</button>

</form>

</div>

</section>

<script src="js/eventos.js"></script>

</body>

</html>
